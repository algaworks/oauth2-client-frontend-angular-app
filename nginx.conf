user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    gzip_disable "MSIE [1-6]\.";

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Cache settings para arquivos estáticos com hash
        location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|gif|png|jpg|jpeg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Cache settings para index.html
        location ~ ^/index\.html$ {
            add_header Cache-Control "public, max-age=0, must-revalidate";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # Rewrite para suportar SPA routing do Angular
        location / {
            # Tenta servir o arquivo requisitado
            # Se não existir, redireciona para index.html
            try_files $uri $uri/ /index.html;
            
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Retornar erro 404 para arquivos que não existem
        error_page 404 /index.html;
    }
}
